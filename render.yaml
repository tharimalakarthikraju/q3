services:
  - type: web
    name: code-interpreter-api
    env: python
    region: oregon
    plan: free
    pythonVersion: 3.11.0
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
